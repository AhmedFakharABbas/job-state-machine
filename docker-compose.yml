services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SEED_DATA_PATH: /app/data/seed.json
      CORS_ORIGINS: http://localhost:3000
      TRANSITION_TO_RUNNING_SECONDS: "1.0"
      TRANSITION_TO_TERMINAL_SECONDS: "1.0"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:8000
    depends_on:
      - backend
